version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: priceguard-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: priceguard-server
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/priceguard
    depends_on:
      - mongodb
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: priceguard-client
    ports:
      - '5173:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
